experiment_settings:
  run_mode: drift_simulation
  standard_experiments: []
  drift_simulation_experiments:
  - RBF_Abrupt_Severe
  - RBF_Gradual_Moderate
  - SEA_Abrupt_Simple
  - SEA_Gradual_Simple_Fast
  - SEA_Abrupt_Recurring
  - AGRAWAL_Abrupt_Simple_Severe
  - AGRAWAL_Gradual_Chain
  - HYPERPLANE_Abrupt_Simple
  - STAGGER_Abrupt_Chain
  - SINE_Abrupt_Simple
  - SINE_Gradual_Recurring
  num_runs: 1
  base_results_dir: experiment_expanded_results
  logging_level: INFO
  evaluation_period: 3000

data_params:
  chunk_size: 3000  # Otimizado baseado em validacao (15 min/chunk)
  num_chunks: 4     # 3 avaliacoes train-then-test
  max_instances: 12000

ga_params:
  population_size: 100
  max_generations: 200
  max_generations_recovery: 25
  recovery_generation_multiplier: 1.5
  enable_explicit_drift_adaptation: true
  recovery_mutation_override_rate: 0.5
  recovery_mutation_override_generations: 10
  recovery_initialization_strategy: full_random
  recovery_random_individual_ratio: 0.6
  recovery_max_depth_multiplier: 1.5
  recovery_max_rules_multiplier: 1.5
  elitism_rate: 0.1
  intelligent_mutation_rate: 0.8
  initial_tournament_size: 2
  final_tournament_size: 5
  max_rules_per_class: 15
  initial_max_depth: 10
  stagnation_threshold: 10
  early_stopping_patience: 20
  hc_enable_adaptive: false
  hc_gmean_threshold: 0.9
  hc_hierarchical_enabled: true
  enable_dt_seeding_on_init: true
  dt_seeding_ratio_on_init: 0.8
  dt_seeding_depths_on_init:
  - 4
  - 7
  - 10
  - 13
  dt_seeding_sample_size_on_init: 2000
  dt_seeding_rules_to_replace_per_class: 4
  dt_rule_injection_ratio: 0.5
  enable_adaptive_seeding: true
  adaptive_seeding_strategy: dt_probe
  adaptive_complexity_simple_threshold: 0.9
  adaptive_complexity_medium_threshold: 0.75
  use_balanced_crossover: true

memory_params:
  max_memory_size: 20
  enable_active_memory_pruning: true
  memory_max_age_chunks: 10
  memory_fitness_threshold_percentile_for_old_removal: 0.25
  memory_min_retain_count_during_pruning: 5
  abandon_memory_on_severe_performance_drop: true
  performance_drop_threshold_for_memory_abandon: 0.55
  consecutive_bad_chunks_for_memory_abandon: 1
  historical_reference_size: 500
  concept_fingerprint_similarity_threshold: 0.90

fitness_params:
  class_coverage_coefficient: 0.2
  gmean_bonus_coefficient: 0.1
  initial_regularization_coefficient: 0.001
  feature_penalty_coefficient: 0.1
  operator_penalty_coefficient: 0.0001
  threshold_penalty_coefficient: 0.0001
  operator_change_coefficient: 0.05
  gamma: 0.1
  drift_penalty_reduction_threshold: 0.1
  absolute_bad_threshold_for_label: 0.6
  min_regularization_coeff: 0.01
  max_regularization_coeff: 0.3

parallelism:
  enabled: true
  num_workers: null

drift_analysis:
  severity_samples: 20000
  heatmap_save_directory: experiment_expanded_results/heatmaps
  datasets:
    RBF:
      class: river.datasets.synth.RandomRBF
      n_features: 10
      feature_bounds:
      - - 0
        - 1
      concepts:
        c1:
          seed_model: 42
        c2_severe:
          seed_model: 84
        c3_moderate:
          seed_model: 60
      pairs_to_compare:
      - - c1
        - c2_severe
      - - c1
        - c3_moderate

    SEA:
      class: river.datasets.synth.SEA
      n_features: 3
      feature_bounds: [[0, 10], [0, 10], [0, 10]]
      concepts:
        f1:
          variant: 0
        f2:
          variant: 1
        f3:
          variant: 2
        f4:
          variant: 3
      pairs_to_compare:
      - - f1
        - f2
      - - f1
        - f3

    AGRAWAL:
      class: river.datasets.synth.Agrawal
      n_features: 9
      feature_bounds: [[0, 1]]
      concepts:
        f1:
          classification_function: 1
        f2:
          classification_function: 2
        f3:
          classification_function: 3
        f5:
          classification_function: 5
        f6:
          classification_function: 6
        f7:
          classification_function: 7
      pairs_to_compare:
      - - f1
        - f2
      - - f1
        - f6

    HYPERPLANE:
      class: river.datasets.synth.Hyperplane
      n_features: 10
      n_classes: 4
      feature_bounds: [[0, 1]]
      concepts:
        plane1:
          seed: 42
        plane2:
          seed: 84
          mag_change: 0.01
      pairs_to_compare:
      - - plane1
        - plane2

    STAGGER:
      class: river.datasets.synth.STAGGER
      n_features: 3
      feature_bounds: [[1, 3], [1, 3], [1, 3]]
      concepts:
        f1:
          classification_function: 0
        f2:
          classification_function: 1
        f3:
          classification_function: 2
      pairs_to_compare:
      - - f1
        - f2
      - - f2
        - f3

    SINE:
      class: river.datasets.synth.Sine
      n_features: 5
      feature_bounds:
        - [0, 6.28]
        - [0, 6.28]
        - [0, 6.28]
        - [0, 6.28]
        - [0, 6.28]
      concepts:
        f1_sum:
          type: sum
          threshold: 1.0
        f2_prod:
          type: prod
          threshold: 0.3
        f3_sum_alt:
          type: sum
          threshold: 1.5
      pairs_to_compare:
      - - f1_sum
        - f2_prod
      - - f1_sum
        - f3_sum_alt

experimental_streams:
  # ========================================
  # DATASET 1: RBF_Abrupt_Severe (JA VALIDADO)
  # ========================================
  RBF_Abrupt_Severe:
    dataset_type: RBF
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: c1
      duration_chunks: 2
    - concept_id: c2_severe
      duration_chunks: 2

  # ========================================
  # DATASET 2: RBF_Gradual_Moderate
  # ========================================
  RBF_Gradual_Moderate:
    dataset_type: RBF
    drift_type: gradual
    gradual_drift_width_chunks: 2
    concept_sequence:
    - concept_id: c1
      duration_chunks: 2
    - concept_id: c3_moderate
      duration_chunks: 2

  # ========================================
  # DATASET 3: SEA_Abrupt_Simple
  # ========================================
  SEA_Abrupt_Simple:
    dataset_type: SEA
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: f1
      duration_chunks: 2
    - concept_id: f3
      duration_chunks: 2

  # ========================================
  # DATASET 4: SEA_Gradual_Simple_Fast
  # ========================================
  SEA_Gradual_Simple_Fast:
    dataset_type: SEA
    drift_type: gradual
    gradual_drift_width_chunks: 1
    concept_sequence:
    - concept_id: f1
      duration_chunks: 2
    - concept_id: f3
      duration_chunks: 2

  # ========================================
  # DATASET 5: SEA_Abrupt_Recurring
  # ========================================
  SEA_Abrupt_Recurring:
    dataset_type: SEA
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: f1
      duration_chunks: 1
    - concept_id: f3
      duration_chunks: 2
    - concept_id: f1
      duration_chunks: 1

  # ========================================
  # DATASET 6: AGRAWAL_Abrupt_Simple_Severe
  # ========================================
  AGRAWAL_Abrupt_Simple_Severe:
    dataset_type: AGRAWAL
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: f1
      duration_chunks: 2
    - concept_id: f6
      duration_chunks: 2

  # ========================================
  # DATASET 7: AGRAWAL_Gradual_Chain
  # ========================================
  AGRAWAL_Gradual_Chain:
    dataset_type: AGRAWAL
    drift_type: gradual
    gradual_drift_width_chunks: 2
    concept_sequence:
    - concept_id: f1
      duration_chunks: 1
    - concept_id: f3
      duration_chunks: 1
    - concept_id: f5
      duration_chunks: 1
    - concept_id: f7
      duration_chunks: 1

  # ========================================
  # DATASET 8: HYPERPLANE_Abrupt_Simple
  # ========================================
  HYPERPLANE_Abrupt_Simple:
    dataset_type: HYPERPLANE
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: plane1
      duration_chunks: 2
    - concept_id: plane2
      duration_chunks: 2

  # ========================================
  # DATASET 9: STAGGER_Abrupt_Chain
  # ========================================
  STAGGER_Abrupt_Chain:
    dataset_type: STAGGER
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: f1
      duration_chunks: 1
    - concept_id: f2
      duration_chunks: 2
    - concept_id: f3
      duration_chunks: 1

  # ========================================
  # DATASET 10: SINE_Abrupt_Simple
  # ========================================
  SINE_Abrupt_Simple:
    dataset_type: SINE
    drift_type: abrupt
    gradual_drift_width_chunks: 0
    concept_sequence:
    - concept_id: f1_sum
      duration_chunks: 2
    - concept_id: f2_prod
      duration_chunks: 2

  # ========================================
  # DATASET 11: SINE_Gradual_Recurring
  # ========================================
  SINE_Gradual_Recurring:
    dataset_type: SINE
    drift_type: gradual
    gradual_drift_width_chunks: 2
    concept_sequence:
    - concept_id: f1_sum
      duration_chunks: 1
    - concept_id: f3_sum_alt
      duration_chunks: 2
    - concept_id: f1_sum
      duration_chunks: 1
